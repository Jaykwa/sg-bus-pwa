# Cloudflare Workers 設定
# デプロイ: npx wrangler deploy
# 鍵の設定: npx wrangler secret put LTA_ACCOUNT_KEY
# ローカル開発: npx wrangler dev  （.dev.vars に LTA_ACCOUNT_KEY を書く）

name = "sg-bus-pwa"
main = "worker.js"
compatibility_date = "2024-11-01"

# public/ をそのまま静的配信する。
# ・パスが静的ファイルに一致 → CF が直接返す（Worker を通らへん＝速い）
# ・一致せえへん（/api/* など） → worker.js が処理する
# ・binding で Worker から env.ASSETS.fetch() も使えるが、今回は使わへん
[assets]
directory = "./public"
binding = "ASSETS"
# 既定だと /index.html → / に307リダイレクトされ、TWA(Androidアプリ)の起動URL
# (/index.html)がコケる。"none" でリダイレクトを止め、/index.html を素直に200で返す。
# 代わりにトップ "/" は worker.js が index.html を返す。
html_handling = "none"

# Google ログイン用の Client ID（公開情報。Google Cloud Console で発行して貼る）
[vars]
GOOGLE_CLIENT_ID = "376496389074-ffcqnp5cvjtta7s5okuvh9gujeib3odb.apps.googleusercontent.com"
# Web Push（通知）。公開鍵は公開情報。秘密鍵は `wrangler secret put VAPID_PRIVATE_KEY`。
VAPID_PUBLIC_KEY = "BD20EHkQdPXY-hdZrly6KWqKdAEKdLFOlk-cKvyMsn4HLwcO6OStKoXvjo0FwWE0XJ1FIwJZQhhkTkRly9Vn3MA"
VAPID_SUBJECT = "mailto:kuwasuke@gmail.com"

# お気に入りをユーザー毎に保存する KV
[[kv_namespaces]]
binding = "FAV_KV"
id = "bb2f2e40be604c9fb14dd5093d939b04"

# 到着通知のスケジュールを毎分チェックする Cron
[triggers]
crons = ["* * * * *"]
